format: student-data-exchange-schema # 固定
version: 1 # 固定，当前格式版本为 1

manifest: # 可选，文件元信息
  producer: BSCE # 可选，字符串，导出来源软件
  producerVersion: "2.3.0" # 可选，字符串，来源软件版本
  exportedAt: "2026-07-05T10:00:00+08:00" # 可选，字符串，ISO 8601 时间，建议加引号
  locale: zh-CN # 可选，字符串，语言/地区

metadata: # 可选，班级/名单说明信息
  name: 三年级二班 # 可选，字符串，班级、群组或名单名称
  description: 三年级二班的学生数据 # 可选，字符串，说明文字

students: # 可选，学生名单
  - id: student:001 # 字符串，本文件内学生 ID
    number: "1" # 可选，字符串，学号/编号
    gender: male # 可选，字符串，male / female / other / unknown
    name: # 姓名信息
      display: 张三 # 字符串，用于显示的姓名
    tags:
      - tag:group-a # 字符串，引用 tags.id
    attributes: # 可选，学生属性值，键引用 attributeDefinitions.id
      attr:score: 92 # 成绩示例；实际类型由 attributeDefinitions 定义
      attr:height: 168 # 身高示例

  - id: student:002
    number: "2"
    gender: female
    name:
      display: 李四
    tags:
      - tag:group-b
    attributes:
      attr:score: 88
      attr:height: 162

tags: # 可选，标签定义
  - id: tag:group-a # 字符串，标签 ID
    name: A组 # 字符串，标签显示名
    color: "#FF0000" # 可选，字符串，颜色，"#RRGGBB" 或 "rgba(...)"
  - id: tag:group-b
    name: B组
    color: "rgba(0, 255, 0, 0.5)"

attributeDefinitions: # 可选，学生属性定义
  - id: attr:score # 字符串，属性 ID
    name: 成绩 # 字符串，属性显示名
    type: number # 字符串，number / 字符串 / boolean / color
    unit: 分 # 可选，字符串，单位
  - id: attr:height
    name: 身高
    type: number
    unit: cm

seatCharts: # 可选，座位表列表
  - id: chart:grid-main # 字符串，座位表 ID
    name: 网格座位表 # 可选，字符串，座位表名称
    layoutModel: grid # 字符串，布局模型；grid 表示 open_fuckseats 类二维网格
    coordinateSystem: # 坐标系统说明
      origin: front-left # 字符串，front-left / front-right / back-left / back-right
      xDirection: left-to-right # 字符串，left-to-right / right-to-left
      yDirection: front-to-back # 字符串，front-to-back / back-to-front
    grid: # layoutModel 为 grid 时建议填写，object
      rows: 6 # 正整数，网格总行数
      columns: 8 # 正整数，网格总列数
    seats: # array，网格内座位或标志物
      - id: seat:grid:1:1 # 字符串，单元 ID，assignments 需要引用
        x: 1 # 整数，网格 x 坐标
        y: 1 # 整数，网格 y 坐标
        kind: seat # 字符串，枚举建议：seat / platform / door / aisle / empty / guard
        group: 1 # 可选，整数|字符串，座位所属组
        capacity: 1 # 可选，非负整数，每个座位的容量，默认 1
      - id: aisle:grid:2:1
        x: 2
        y: 1
        kind: aisle
      - id: platform:grid:front
        x: 4
        y: 0
        kind: platform
    assignments: # 可选，array，学生与座位绑定关系
      - seatId: seat:grid:1:1 # 字符串，引用 seats.id
        studentId: student:001 # 字符串，引用 students.id

  - id: chart:grouped-main
    name: 大组座位表
    layoutModel: groupedColumns # 字符串，布局模型；groupedColumns 表示 scev2 类大组-列-行
    coordinateSystem:
      origin: front-left
      xDirection: left-to-right
      yDirection: front-to-back
    groupedColumns: # layoutModel 为 groupedColumns 时建议填写
      groups: # 大组定义
        - id: group:0 # 可选，字符串，大组 ID
          columns: 2 # 正整数，该大组列数
          rows: 7 # 正整数，该大组行数
        - id: group:1
          columns: 2
          rows: 7
    seats:
      - id: seat:grouped:0:0:0
        kind: seat
        group: 0 # 大组ID
        column: 0 # 整数，组内列索引
        row: 0 # 整数，组内行索引
        capacity: 1
      - id: seat:grouped:0:1:0
        kind: seat
        group: 0
        column: 1
        row: 0
      - id: guard:left
        kind: guard
        side: left # 可选，字符串，guard 专用，left / right
    assignments:
      - seatId: seat:grouped:0:0:0
        studentId: student:001
      - seatId: guard:left
        studentId: student:002

extensions: # 可选，扩展数据；未知命名空间应原样保留但不能执行
  app.bsce: # 可选，BSCE 私有扩展
    customLayoutMode: compact # 可选，任意 JSON/YAML 基础类型，私有字段示例
  org.open-fuckseats: # 可选，open_fuckseats 私有扩展
    constraints: [] # 可选，array，无法映射到通用规则时可保留在这里
    